<div class="login-container">
  <div class="login-form">
    <h2>Login</h2>
    
    <!-- Login Type Toggle -->
    <div class="login-type-toggle">
      <div class="toggle-container">
        <div class="toggle-option" [class.active]="loginType === 'user'" (click)="setLoginType('user')">
          <span>👤 User</span>
        </div>
        <div class="toggle-option" [class.active]="loginType === 'admin'" (click)="setLoginType('admin')">
          <span>👑 Admin</span>
        </div>
        <div class="toggle-slider" [class.admin]="loginType === 'admin'"></div>
      </div>
      <p class="toggle-info">Slide to switch login type</p>
    </div>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email:</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          placeholder="Enter your email"
          [disabled]="loading">
        <div class="error" *ngIf="loginForm.get('email')?.hasError('required') && loginForm.get('email')?.touched">
          Email is required.
        </div>
        <div class="error" *ngIf="loginForm.get('email')?.hasError('email') && loginForm.get('email')?.touched">
          Email must be a valid email address.
        </div>
        <div class="error" *ngIf="loginForm.get('email')?.hasError('lowercase') && loginForm.get('email')?.touched">
          {{ loginForm.get('email')?.getError('lowercase') }}
        </div>
      </div>
      
      <div class="form-group">
        <label for="password">Password:</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          placeholder="Enter your password"
          [disabled]="loading">
        <div class="error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Password is required and must be at least 6 characters
        </div>
      </div>
      
      <div class="error" *ngIf="error">{{ error }}</div>
      
      <button type="submit" [disabled]="loading || loginForm.invalid">
        {{ loading ? 'Logging in...' : 'Login as ' + (loginType === 'admin' ? 'Admin' : 'User') }}
      </button>
    </form>
    
    <p>
      Don't have an account? <a routerLink="/register">Register here</a>
    </p>
  </div>
</div>
