<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set User</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f2ea;
            --card: #fffdf9;
            --text: #171717;
            --muted: #5f5f5f;
            --border: rgba(23, 23, 23, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Segoe UI", Arial, sans-serif;
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.95), transparent 42%),
                linear-gradient(160deg, #fcfbf7 0%, var(--bg) 100%);
            color: var(--text);
        }

        .status-card {
            width: min(100%, 420px);
            padding: 32px 28px;
            border: 1px solid var(--border);
            border-radius: 28px;
            background: var(--card);
            box-shadow: 0 24px 60px rgba(23, 23, 23, 0.08);
            text-align: center;
        }

        .logo {
            width: 220px;
            max-width: 100%;
            display: block;
            margin: 0 auto 20px;
        }

        .status-title {
            margin: 0 0 10px;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.01em;
        }

        .status-text {
            margin: 0;
            color: var(--muted);
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <script>
        // Keep tab ID behavior consistent with AuthService/AuthInterceptor
        function getOrCreateTabId() {
            if (window.name && window.name.startsWith('tab_')) {
                return window.name;
            }

            const newTabId = 'tab_' + Math.random().toString(36).substr(2, 9);
            window.name = newTabId;
            return newTabId;
        }

        const card = document.createElement('div');
        card.className = 'status-card';
        card.innerHTML = `
            <img class="logo" src="./tastybite-logo.png" alt="TastyBite logo" />
            <p class="status-title">Setting your session</p>
            <p class="status-text">Please wait while we sign you in and redirect you to the app.</p>
        `;
        document.body.appendChild(card);

        const status = card.querySelector('.status-text');

        try {
            const user = {
                _id: '123',
                id: '123',
                name: 'Test User',
                email: 'test@example.com',
                role: 'user'
            };

            const token = 'test-token-123';
            const tabId = getOrCreateTabId();

            sessionStorage.setItem(`currentUser_${tabId}`, JSON.stringify(user));
            sessionStorage.setItem(`token_${tabId}`, token);

            console.log('Tab ID:', tabId);
            console.log('User set in sessionStorage:', user);
            console.log('Token set in sessionStorage:', token);

            setTimeout(() => {
                window.location.href = 'http://localhost:4200';
            }, 1500);
        } catch (error) {
            console.error('Failed to set user session:', error);
            status.textContent = 'Failed to set session. Open this file in a normal browser tab and try again.';
        }
    </script>
</body>
</html>
