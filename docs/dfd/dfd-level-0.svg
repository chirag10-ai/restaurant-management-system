<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f5f5f5"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#333">DFD Level 0 - Restaurant Management System</text>
  
  <!-- External Entity: Customer -->
  <rect x="50" y="200" width="120" height="80" fill="#4a90d9" stroke="#2c5a8c" stroke-width="2" rx="5"/>
  <text x="110" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">Customer</text>
  
  <!-- External Entity: Admin -->
  <rect x="50" y="350" width="120" height="80" fill="#4a90d9" stroke="#2c5a8c" stroke-width="2" rx="5"/>
  <text x="110" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">Admin</text>
  
  <!-- Process: Restaurant Management System -->
  <circle cx="400" cy="300" r="100" fill="#4a90d9" stroke="#2c5a8c" stroke-width="3"/>
  <text x="400" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" font-weight="bold">Restaurant</text>
  <text x="400" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" font-weight="bold">Management</text>
  <text x="400" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white">System</text>
  
  <!-- Data Store: Database -->
  <ellipse cx="650" cy="220" rx="80" ry="40" fill="#4a90d9" stroke="#2c5a8c" stroke-width="2"/>
  <ellipse cx="650" cy="200" rx="80" ry="40" fill="#5ba0e9" stroke="#2c5a8c" stroke-width="2"/>
  <text x="650" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">Database</text>
  
  <!-- Data Store: File Storage -->
  <ellipse cx="650" cy="380" rx="80" ry="40" fill="#4a90d9" stroke="#2c5a8c" stroke-width="2"/>
  <ellipse cx="650" cy="360" rx="80" ry="40" fill="#5ba0e9" stroke="#2c5a8c" stroke-width="2"/>
  <text x="650" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">File Storage</text>
  
  <!-- Arrows: Customer to System -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Customer -> System -->
  <line x1="170" y1="230" x2="300" y2="270" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="220" y="245" font-family="Arial, sans-serif" font-size="11" fill="#333">Order Request</text>
  
  <!-- System -> Customer -->
  <line x1="300" y1="290" x2="170" y2="250" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="220" y="275" font-family="Arial, sans-serif" font-size="11" fill="#333">Order Confirmation</text>
  
  <!-- Admin -> System -->
  <line x1="170" y1="380" x2="300" y2="330" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="210" y="365" font-family="Arial, sans-serif" font-size="11" fill="#333">Manage Data</text>
  
  <!-- System -> Admin -->
  <line x1="300" y1="350" x2="170" y2="400" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="210" y="385" font-family="Arial, sans-serif" font-size="11" fill="#333">Reports</text>
  
  <!-- System -> Database -->
  <line x1="500" y1="270" x2="570" y2="220" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="530" y="235" font-family="Arial, sans-serif" font-size="11" fill="#333">Store/Retrieve</text>
  
  <!-- System -> File Storage -->
  <line x1="500" y1="330" x2="570" y2="380" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="520" y="365" font-family="Arial, sans-serif" font-size="11" fill="#333">Upload/Retrieve</text>
</svg>