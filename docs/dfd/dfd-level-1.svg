<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Background -->
  <rect width="1200" height="800" fill="#f5f5f5"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#333">DFD Level 1 - Restaurant Management System</text>
  
  <!-- External Entities -->
  <!-- Customer -->
  <rect x="30" y="150" width="100" height="60" fill="#4a90d9" stroke="#2c5a8c" stroke-width="2" rx="5"/>
  <text x="80" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">Customer</text>
  
  <!-- Admin -->
  <rect x="30" y="350" width="100" height="60" fill="#4a90d9" stroke="#2c5a8c" stroke-width="2" rx="5"/>
  <text x="80" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">Admin</text>
  
  <!-- Processes (Circles) -->
  <!-- P1: User Management -->
  <circle cx="300" cy="120" r="50" fill="#4a90d9" stroke="#2c5a8c" stroke-width="2"/>
  <text x="300" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">1.0</text>
  <text x="300" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">User Mgmt</text>
  
  <!-- P2: Menu Management -->
  <circle cx="300" cy="240" r="50" fill="#4a90d9" stroke="#2c5a8c" stroke-width="2"/>
  <text x="300" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">2.0</text>
  <text x="300" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Menu Mgmt</text>
  
  <!-- P3: Order Processing -->
  <circle cx="300" cy="360" r="50" fill="#4a90d9" stroke="#2c5a8c" stroke-width="2"/>
  <text x="300" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">3.0</text>
  <text x="300" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Order Process</text>
  
  <!-- P4: Booking System -->
  <circle cx="300" cy="480" r="50" fill="#4a90d9" stroke="#2c5a8c" stroke-width="2"/>
  <text x="300" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">4.0</text>
  <text x="300" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Booking</text>
  
  <!-- P5: Payment Processing -->
  <circle cx="300" cy="600" r="50" fill="#4a90d9" stroke="#2c5a8c" stroke-width="2"/>
  <text x="300" y="595" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">5.0</text>
  <text x="300" y="610" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Payment</text>
  
  <!-- P6: Report Generation -->
  <circle cx="550" cy="360" r="50" fill="#4a90d9" stroke="#2c5a8c" stroke-width="2"/>
  <text x="550" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">6.0</text>
  <text x="550" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Reports</text>
  
  <!-- Data Stores (Cylinders) -->
  <!-- D1: Users DB -->
  <ellipse cx="850" cy="100" rx="70" ry="30" fill="#4a90d9" stroke="#2c5a8c" stroke-width="2"/>
  <ellipse cx="850" cy="85" rx="70" ry="30" fill="#5ba0e9" stroke="#2c5a8c" stroke-width="2"/>
  <text x="850" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">D1: Users</text>
  
  <!-- D2: Menu DB -->
  <ellipse cx="850" cy="200" rx="70" ry="30" fill="#4a90d9" stroke="#2c5a8c" stroke-width="2"/>
  <ellipse cx="850" cy="185" rx="70" ry="30" fill="#5ba0e9" stroke="#2c5a8c" stroke-width="2"/>
  <text x="850" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">D2: Menu</text>
  
  <!-- D3: Orders DB -->
  <ellipse cx="850" cy="300" rx="70" ry="30" fill="#4a90d9" stroke="#2c5a8c" stroke-width="2"/>
  <ellipse cx="850" cy="285" rx="70" ry="30" fill="#5ba0e9" stroke="#2c5a8c" stroke-width="2"/>
  <text x="850" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">D3: Orders</text>
  
  <!-- D4: Bookings DB -->
  <ellipse cx="850" cy="400" rx="70" ry="30" fill="#4a90d9" stroke="#2c5a8c" stroke-width="2"/>
  <ellipse cx="850" cy="385" rx="70" ry="30" fill="#5ba0e9" stroke="#2c5a8c" stroke-width="2"/>
  <text x="850" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">D4: Bookings</text>
  
  <!-- D5: Payments DB -->
  <ellipse cx="850" cy="500" rx="70" ry="30" fill="#4a90d9" stroke="#2c5a8c" stroke-width="2"/>
  <ellipse cx="850" cy="485" rx="70" ry="30" fill="#5ba0e9" stroke="#2c5a8c" stroke-width="2"/>
  <text x="850" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">D5: Payments</text>
  
  <!-- D6: Revenue DB -->
  <ellipse cx="850" cy="600" rx="70" ry="30" fill="#4a90d9" stroke="#2c5a8c" stroke-width="2"/>
  <ellipse cx="850" cy="585" rx="70" ry="30" fill="#5ba0e9" stroke="#2c5a8c" stroke-width="2"/>
  <text x="850" y="605" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">D6: Revenue</text>
  
  <!-- Arrow Marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Data Flows -->
  <!-- Customer to P1 -->
  <line x1="130" y1="170" x2="250" y2="130" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="180" y="145" font-family="Arial, sans-serif" font-size="9" fill="#333">Login/Register</text>
  
  <!-- Customer to P2 -->
  <line x1="130" y1="180" x2="250" y2="240" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="170" y="220" font-family="Arial, sans-serif" font-size="9" fill="#333">View Menu</text>
  
  <!-- Customer to P3 -->
  <line x1="130" y1="190" x2="250" y2="360" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="160" y="290" font-family="Arial, sans-serif" font-size="9" fill="#333">Place Order</text>
  
  <!-- Customer to P4 -->
  <line x1="130" y1="200" x2="250" y2="480" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="160" y="350" font-family="Arial, sans-serif" font-size="9" fill="#333">Book Table</text>
  
  <!-- Admin to P1 -->
  <line x1="130" y1="360" x2="250" y2="140" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="170" y="240" font-family="Arial, sans-serif" font-size="9" fill="#333">Manage Users</text>
  
  <!-- Admin to P2 -->
  <line x1="130" y1="370" x2="250" y2="260" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="170" y="300" font-family="Arial, sans-serif" font-size="9" fill="#333">Update Menu</text>
  
  <!-- Admin to P6 -->
  <line x1="130" y1="380" x2="500" y2="360" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="280" y="360" font-family="Arial, sans-serif" font-size="9" fill="#333">View Reports</text>
  
  <!-- P1 to D1 -->
  <line x1="350" y1="120" x2="780" y2="100" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="550" y="105" font-family="Arial, sans-serif" font-size="9" fill="#333">User Data</text>
  
  <!-- P2 to D2 -->
  <line x1="350" y1="240" x2="780" y2="200" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="550" y="215" font-family="Arial, sans-serif" font-size="9" fill="#333">Menu Items</text>
  
  <!-- P3 to D3 -->
  <line x1="350" y1="360" x2="780" y2="300" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="550" y="325" font-family="Arial, sans-serif" font-size="9" fill="#333">Order Details</text>
  
  <!-- P4 to D4 -->
  <line x1="350" y1="480" x2="780" y2="400" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="550" y="435" font-family="Arial, sans-serif" font-size="9" fill="#333">Booking Info</text>
  
  <!-- P5 to D5 -->
  <line x1="350" y1="600" x2="780" y2="500" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="550" y="545" font-family="Arial, sans-serif" font-size="9" fill="#333">Payment Info</text>
  
  <!-- P3 to P5 -->
  <line x1="350" y1="380" x2="250" y2="580" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="270" y="490" font-family="Arial, sans-serif" font-size="9" fill="#333">Process Payment</text>
  
  <!-- P3 to P6 -->
  <line x1="350" y1="360" x2="500" y2="360" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="420" y="355" font-family="Arial, sans-serif" font-size="9" fill="#333">Order Data</text>
  
  <!-- P5 to D6 -->
  <line x1="350" y1="600" x2="780" y2="600" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="550" y="595" font-family="Arial, sans-serif" font-size="9" fill="#333">Revenue Data</text>
  
  <!-- Legend -->
  <rect x="980" y="650" width="200" height="130" fill="white" stroke="#ccc" stroke-width="1" rx="5"/>
  <text x="1080" y="670" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Legend</text>
  
  <rect x="990" y="680" width="30" height="20" fill="#4a90d9" stroke="#2c5a8c" stroke-width="1" rx="3"/>
  <text x="1030" y="695" font-family="Arial, sans-serif" font-size="10" fill="#333">External Entity</text>
  
  <circle cx="1005" cy="720" r="12" fill="#4a90d9" stroke="#2c5a8c" stroke-width="1"/>
  <text x="1030" y="725" font-family="Arial, sans-serif" font-size="10" fill="#333">Process</text>
  
  <ellipse cx="1005" cy="760" rx="15" ry="8" fill="#4a90d9" stroke="#2c5a8c" stroke-width="1"/>
  <text x="1030" y="765" font-family="Arial, sans-serif" font-size="10" fill="#333">Data Store</text>
</svg>